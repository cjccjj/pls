name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
          - os: linux
            arch: arm64
          - os: darwin
            arch: arm64
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install UPX
        if: matrix.os != 'darwin'
        run: |
          curl -fsSL https://github.com/upx/upx/releases/download/v5.2.0/upx-5.2.0-amd64_linux.tar.xz -o upx.tar.xz
          tar -xf upx.tar.xz
          sudo mv upx-5.2.0-amd64_linux/upx /usr/local/bin/upx
          upx --version

      - name: Build
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${{ github.ref_name }}
          go build -trimpath \
            -ldflags="-s -w -X 'github.com/cjccjj/pls/internal/pls.Version=${VERSION}'" \
            -o pls-${{ matrix.os }}-${{ matrix.arch }} ./cmd/pls

      - name: Compress
        if: matrix.os != 'darwin'
        run: |
          upx --best --lzma pls-${{ matrix.os }}-${{ matrix.arch }}
          ls -lh pls-${{ matrix.os }}-${{ matrix.arch }}

      - name: SHA256
        run: sha256sum pls-${{ matrix.os }}-${{ matrix.arch }} > pls-${{ matrix.os }}-${{ matrix.arch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: pls-${{ matrix.os }}-${{ matrix.arch }}
          path: |
            pls-${{ matrix.os }}-${{ matrix.arch }}
            pls-${{ matrix.os }}-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pls-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            pls-linux-amd64
            pls-linux-amd64.sha256
            pls-linux-arm64
            pls-linux-arm64.sha256
            pls-darwin-arm64
            pls-darwin-arm64.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
