name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        arch: [amd64, arm64]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: '1.25'

      - name: Install UPX
        run: |
          sudo apt-get update -q
          sudo apt-get install -y -q upx-ucl

      - name: Build
        env:
          GOOS: linux
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: '0'
        run: |
          VERSION=${{ github.ref_name }}
          go build -trimpath \
            -ldflags="-s -w -X 'github.com/cjccjj/pls/internal/pls.Version=${VERSION}'" \
            -o pls-linux-${{ matrix.arch }} ./cmd/pls

      - name: Compress
        run: |
          upx --best --lzma pls-linux-${{ matrix.arch }}
          ls -lh pls-linux-${{ matrix.arch }}

      - name: SHA256
        run: sha256sum pls-linux-${{ matrix.arch }} > pls-linux-${{ matrix.arch }}.sha256

      - uses: actions/upload-artifact@v4
        with:
          name: pls-linux-${{ matrix.arch }}
          path: |
            pls-linux-${{ matrix.arch }}
            pls-linux-${{ matrix.arch }}.sha256

  release:
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: pls-linux-*
          merge-multiple: true

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: ${{ github.ref_name }}
          files: |
            pls-linux-amd64
            pls-linux-amd64.sha256
            pls-linux-arm64
            pls-linux-arm64.sha256
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
